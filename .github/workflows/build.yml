name: 3DS Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitpro:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm devkitARM 3ds-dev

      - name: Build
        run: make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: "*.3dsx"
