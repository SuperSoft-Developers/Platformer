name: Build 3DS (Container DevkitPro)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ELF (no Makefile)
        run: |
          arm-none-eabi-gcc main.c -o main.elf \
          -I/opt/devkitpro/libctru/include \
          -L/opt/devkitpro/libctru/lib \
          -lctru -lm

      - name: Generate ICON
        run: |
          apt-get update
          apt-get install -y imagemagick

          convert icon.png -resize 48x48 icon.bmp
          tex3ds -i icon.bmp -o icon.t3x
          bannertool maketex -i icon.t3x -o icon.icn

      - name: Generate BANNER
        run: |
          convert banner.png -resize 256x128 banner.bmp
          bannertool makebanner -i banner.bmp -o banner.bnr

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-build
          path: |
            *.elf
            *.icn
            *.bnr
