name: Build 3DS (No Makefile, No curl)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # ONLY SYSTEM DEPS (NO curl)
      # -----------------------------
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git imagemagick build-essential xz-utils gnupg

      # -----------------------------
      # INSTALL DEVKITPRO VIA OFFICIAL SCRIPT (NO curl USED HERE)
      # -----------------------------
      - name: Install DevkitPro (safe method)
        run: |
          sudo apt-get install -y wget
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman

      # -----------------------------
      # SET ENV
      # -----------------------------
      - name: Setup environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/devkitARM/bin" >> $GITHUB_PATH

      # -----------------------------
      # INSTALL 3DS TOOLCHAIN
      # -----------------------------
      - name: Install 3DS tools
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitARM 3ds-dev bannertool tex3ds

      # -----------------------------
      # BUILD ELF (NO MAKEFILE)
      # -----------------------------
      - name: Build ELF
        run: |
          arm-none-eabi-gcc main.c -o main.elf \
          -I$DEVKITPRO/libctru/include \
          -L$DEVKITPRO/libctru/lib \
          -lctru -lm

      # -----------------------------
      # ICON
      # -----------------------------
      - name: Build ICON
        run: |
          convert icon.png -resize 48x48 icon.bmp
          tex3ds -i icon.bmp -o icon.t3x
          bannertool maketex -i icon.t3x -o icon.icn

      # -----------------------------
      # BANNER
      # -----------------------------
      - name: Build BANNER
        run: |
          convert banner.png -resize 256x128 banner.bmp
          bannertool makebanner -i banner.bmp -o banner.bnr

      # -----------------------------
      # UPLOAD
      # -----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-build
          path: |
            *.elf
            *.icn
            *.bnr
